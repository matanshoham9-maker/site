/* ================================================================
   Course It · Article Page (self-contained) — DARK Journal mode.
   Tokens + base type inlined from the Course It design system
   (colors_and_type.css), plus journal tokens, buttons, chrome and
   the article-page template (article.css). Layout values reference
   tokens; nothing invented beyond the documented journal palette.
   ================================================================ */

:root {
  /* Core palette */
  --ci-white:#FFFFFF; --ci-deep-blue:#024BB9; --ci-deep-blue-2:#023A91;
  --ci-lime:#CCFF00; --ci-lime-ink:#0A0A0A; --ci-field:#4A7A3A;
  --ci-cloud:#ECF1EC; --ci-black:#0A0A0A; --ci-ink:#0A0A0A;
  --ci-ink-soft:rgba(10,10,10,0.62); --ci-line:rgba(10,10,10,0.12);
  --ci-line-strong:rgba(10,10,10,0.22);

  /* Journal (dark reading world) — documented in the kit README */
  --ci-journal-navy:#0A1A2E; --ci-journal-deep:#050E1C; --ci-journal-fg:#F0EEE9;
  --ci-journal-fg-soft:rgba(240,238,233,0.62);
  --ci-journal-fg-faint:rgba(240,238,233,0.40);
  --ci-journal-line:rgba(240,238,233,0.14);

  /* Type families */
  --ci-serif:'Cormorant Garamond', Georgia, serif;
  --ci-serif-he:'Heebo', system-ui, sans-serif;
  --ci-sans:'DM Sans','Heebo', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --ci-sans-he:'Heebo','DM Sans', system-ui, sans-serif;
  --ci-pixel:'Press Start 2P','Courier New', monospace;

  --ci-h3:clamp(24px,2.6vw,44px); --ci-h4:20px;

  /* Spacing (8pt) */
  --ci-s-2:8px; --ci-s-3:12px; --ci-s-4:16px; --ci-s-5:24px; --ci-s-6:32px;
  --ci-s-7:48px; --ci-s-8:64px; --ci-s-9:96px;
  --ci-gutter:24px; --ci-margin-desktop:56px; --ci-margin-mobile:20px;

  --ci-r-md:12px; --ci-r-pill:999px;
  --ci-ease:cubic-bezier(0.22,0.61,0.36,1);
  --ci-dur-fast:140ms; --ci-dur-base:240ms;
}

* { box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
html, body { background: var(--ci-journal-navy); margin: 0; }
body { font-family: var(--ci-sans); font-size: 16px; line-height: 1.5; color: var(--ci-journal-fg); }

/* --- Buttons (from components.css) -------------------------- */
.ci-btn {
  display:inline-flex; align-items:center; justify-content:center; gap:10px;
  height:52px; padding:0 28px; border-radius:var(--ci-r-pill);
  background:var(--ci-deep-blue); color:#fff; border:1.5px solid transparent;
  font-family:var(--ci-sans); font-size:15px; font-weight:500; line-height:1;
  text-decoration:none; cursor:pointer;
  transition:background var(--ci-dur-base) var(--ci-ease), color var(--ci-dur-base) var(--ci-ease),
             border-color var(--ci-dur-base) var(--ci-ease), transform var(--ci-dur-fast) var(--ci-ease);
}
.ci-btn:active { transform: translateY(1px); }
.ci-btn--lime { background:var(--ci-lime); color:var(--ci-lime-ink); }
.ci-btn--lime:hover { background:#b8e600; }
.ci-btn--sm { height:40px; padding:0 18px; font-size:14px; }
.ci-btn--lg { height:60px; padding:0 36px; font-size:16px; }

/* --- Header — EXACT homepage structure (.nav), dark frosted variant.
   Cloud Dancer logo + nav, Lime CTA, frosted glass. direction:ltr so the
   English signature header matches the homepage even on the RTL page. */
.nav {
  position:fixed; inset:0 0 auto 0; z-index:100; direction:ltr;
  display:flex; align-items:center; justify-content:space-between;
  padding:22px var(--ci-margin-desktop);
  color:var(--ci-journal-fg);
  background:rgba(10,26,46,0.55);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--ci-journal-line);
  transition:background 280ms var(--ci-ease), padding 280ms var(--ci-ease);
}
.nav--scrolled { background:rgba(10,26,46,0.82); padding:14px var(--ci-margin-desktop); }
.nav__brand { display:inline-flex; align-items:center; gap:14px; text-decoration:none; color:inherit; }
.nav__brand-mark { width:34px; height:34px; display:inline-block; }
.nav__brand-mark img { width:100%; height:100%; object-fit:contain; display:block; }
.nav__brand-name { font-family:var(--ci-sans); font-size:14px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:inherit; white-space:nowrap; }
.nav__links { display:flex; align-items:center; gap:32px; }
.nav__links a {
  font-family:var(--ci-sans); font-size:14px; font-weight:400; text-decoration:none;
  color:inherit; position:relative; transition:color 240ms var(--ci-ease);
}
.nav__links a:not(.nav__cta):hover { color:var(--ci-lime); }
.nav__links a:not(.nav__cta)::after { content:""; position:absolute; left:0; bottom:-4px; width:0; height:1px; background:currentColor; transition:width 340ms var(--ci-ease); }
.nav__links a:not(.nav__cta):hover::after { width:100%; }
.nav__cta {
  font-family:var(--ci-sans); font-size:13px; font-weight:500; padding:11px 20px;
  border-radius:999px; background:var(--ci-lime); color:var(--ci-black) !important;
  text-decoration:none; display:inline-flex; align-items:center; gap:8px;
  transition:background 240ms var(--ci-ease), transform 240ms var(--ci-ease), box-shadow 320ms var(--ci-ease);
}
.nav__cta:hover { transform:translateY(-2px); box-shadow:0 10px 24px -10px rgba(204,255,0,0.75); }

/* --- Footer (chrome.css, dark only) ------------------------- */
.ci-sitefooter {
  background:var(--ci-journal-deep); color:var(--ci-journal-fg);
  padding:96px var(--ci-margin-desktop) 56px;
  border-top:1px solid var(--ci-journal-line);
}
.ci-sitefooter__inner { max-width:1280px; margin:0 auto; }
.ci-sitefooter__top {
  display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:56px;
  padding-bottom:64px; border-bottom:1px solid var(--ci-journal-line);
}
.ci-sitefooter__brand h3 {
  font-family:var(--ci-serif-he); font-weight:700; font-size:44px;
  line-height:1; margin:22px 0 18px; letter-spacing:-0.01em;
}
.ci-sitefooter__brand h3 em { font-style:normal; color:var(--ci-lime); }
.ci-sitefooter__brand p { font-size:14px; color:var(--ci-journal-fg-soft); max-width:360px; line-height:1.55; margin:0; }
.ci-sitefooter__col h5 {
  font-family:var(--ci-sans); font-size:12px; font-weight:500; color:var(--ci-lime);
  margin:0 0 18px; letter-spacing:0.16em; text-transform:uppercase;
}
.ci-sitefooter__col a { display:block; color:var(--ci-journal-fg); text-decoration:none; font-size:14px; padding:6px 0; transition:color var(--ci-dur-base) var(--ci-ease); }
.ci-sitefooter__col a:hover { color:var(--ci-lime); }
.ci-sitefooter__bottom {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:32px; font-size:12px; color:var(--ci-journal-fg-faint);
}

/* ================================================================
   Article template (article.css) — dark Journal reading mode
   ================================================================ */
.ar { background:var(--ci-journal-navy); color:var(--ci-journal-fg); min-height:100vh; }
.ar-wrap { width:100%; max-width:1180px; margin:0 auto; padding:0 var(--ci-margin-desktop); }
.ar-measure { max-width:680px; margin-inline-start:0; margin-inline-end:auto; text-align:start; }
.ar-sec--tight { padding:var(--ci-s-7) 0; }

/* 01 · Issue banner */
.ar-issue { text-align:center; padding-top:var(--ci-s-9); }
.ar-issue__line {
  direction:ltr; font-family:var(--ci-serif); font-style:italic;
  font-size:var(--ci-h4); color:var(--ci-lime); letter-spacing:0.01em;
}
.ar-issue__rule { width:56px; height:1px; background:var(--ci-journal-line); border:0; margin:var(--ci-s-5) auto 0; }

/* 02 · Opener */
.ar-opener { padding-top:var(--ci-s-7); }
.ar-opener__inner { max-width:920px; margin-inline-start:0; margin-inline-end:auto; }
.ar-opener__cat {
  font-family:var(--ci-sans); font-size:11px; font-weight:500;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--ci-lime); margin:0 0 var(--ci-s-5);
  direction:ltr; text-align:right;
}
.ar-title {
  font-family:var(--ci-serif-he); font-weight:800;
  font-size:clamp(50px,7vw,104px); line-height:1.04; letter-spacing:-0.02em;
  color:var(--ci-journal-fg); margin:0;
}
.ar-title span { display:block; }
.ar-dek {
  direction:rtl; text-align:start; font-family:var(--ci-sans-he); font-weight:300;
  font-size:clamp(18px,2.2vw,26px); line-height:1.55; color:rgba(240,238,233,0.65);
  max-width:620px; margin:var(--ci-s-6) 0 0;
}
.ar-opener__meta {
  margin-top:var(--ci-s-7); padding-top:var(--ci-s-5);
  border-top:1px solid var(--ci-journal-line);
  font-family:var(--ci-sans); font-size:13px; letter-spacing:0.06em;
  color:var(--ci-journal-fg-soft); direction:ltr; text-align:right;
}

/* 03 · Hero */
.ar-hero__grid { display:grid; grid-template-columns:11fr 1fr; gap:var(--ci-s-5); align-items:stretch; }
.ar-hero__img { aspect-ratio:16/10; }
.ar-hero__cap {
  writing-mode:vertical-rl; text-orientation:mixed; direction:ltr;
  font-family:var(--ci-serif); font-style:italic; font-size:14px;
  color:var(--ci-journal-fg-soft); align-self:end; padding-bottom:4px; white-space:nowrap;
}

/* 04 · Lede + drop cap */
.ar-lede { padding-top:var(--ci-s-8); }
.ar-lede__p { font-family:var(--ci-sans-he); font-weight:300; font-size:clamp(20px,1.7vw,24px); line-height:1.75; color:var(--ci-journal-fg); margin:0; }
.ar-dropcap {
  float:right; margin:10px 0 0 14px; font-family:var(--ci-serif-he); font-weight:800;
  font-size:88px; line-height:0.66; color:var(--ci-lime);
}

/* 05 · Chapter marker */
.ar-chapter { display:flex; align-items:baseline; gap:var(--ci-s-4); margin:var(--ci-s-8) 0 var(--ci-s-5); }
.ar-chapter__roman { direction:ltr; font-family:var(--ci-serif); font-style:italic; font-size:24px; color:var(--ci-lime); flex:none; }
.ar-chapter__title { font-family:var(--ci-serif-he); font-weight:700; font-size:clamp(22px,2.2vw,28px); color:var(--ci-journal-fg); margin:0; flex:none; white-space:nowrap; }
.ar-chapter__rule { flex:1; height:1px; background:var(--ci-journal-line); align-self:center; }

/* 06 · Body */
.ar-body__p { font-family:var(--ci-sans-he); font-weight:300; font-size:17px; line-height:1.95; color:var(--ci-journal-fg); margin:0 0 var(--ci-s-6); }
.ar-body__p:last-child { margin-bottom:0; }
.ar-body__p strong { font-weight:700; color:var(--ci-lime); font-style:normal; }

/* 07 · Figures */
.ar-figure { display:flex; direction:ltr; align-items:flex-end; justify-content:space-between; gap:var(--ci-gutter); margin:var(--ci-s-9) 0; }
.ar-figure--b { flex-direction:row-reverse; }
.ar-figure__img { flex:0 0 57%; aspect-ratio:4/5; }
.ar-figure__cap { flex:0 0 31%; padding-bottom:6px; text-align:right; }
.ar-figure__no { direction:ltr; unicode-bidi:isolate; text-align:right; font-family:var(--ci-serif); font-style:italic; font-size:18px; color:var(--ci-lime); display:block; margin-bottom:12px; }
.ar-figure__text { direction:rtl; text-align:right; display:block; font-family:var(--ci-sans-he); font-weight:300; font-size:14px; line-height:1.55; color:var(--ci-journal-fg-soft); }

/* 08 · Pull quote */
.ar-quote { max-width:760px; margin-inline-start:0; margin-inline-end:auto; padding:var(--ci-s-7) 0; text-align:start; }
.ar-quote__mark { text-align:start; font-family:var(--ci-serif); font-style:italic; font-size:80px; line-height:0.4; color:var(--ci-lime); opacity:0.7; display:block; height:44px; }
.ar-quote__q { font-family:var(--ci-sans-he); font-weight:400; font-size:clamp(26px,3vw,36px); line-height:1.4; color:var(--ci-journal-fg); margin:0 0 var(--ci-s-5); }
.ar-quote__q strong { font-weight:700; color:var(--ci-lime); }
.ar-quote__by { direction:ltr; unicode-bidi:isolate; text-align:right; display:block; font-family:var(--ci-sans); font-size:10px; font-weight:500; letter-spacing:0.16em; text-transform:uppercase; color:var(--ci-lime); }

/* 09 · End ornament */
.ar-ornament { text-align:center; direction:ltr; font-family:var(--ci-serif); font-style:italic; font-size:24px; color:var(--ci-lime); letter-spacing:0.4em; padding:var(--ci-s-8) 0; }

/* --- Key takeaways (added section, GEO/summary) ------------- */
.ar-takeaways { border-top:1px solid var(--ci-journal-line); border-bottom:1px solid var(--ci-journal-line); padding:var(--ci-s-8) 0; }
.ar-takeaways__eyebrow { direction:ltr; text-align:right; font-family:var(--ci-sans); font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--ci-lime); margin:0 0 var(--ci-s-5); }
.ar-takeaways__list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:var(--ci-s-4); }
.ar-takeaways__list li { display:flex; gap:var(--ci-s-4); align-items:flex-start; font-family:var(--ci-sans-he); font-weight:300; font-size:17px; line-height:1.7; color:var(--ci-journal-fg); }
.ar-takeaways__list li::before { content:"✦"; color:var(--ci-lime); font-size:13px; line-height:1.9; flex:none; }

/* 10 · Author */
.ar-author { max-width:720px; margin:0 auto; text-align:center; border-top:1px solid var(--ci-journal-line); border-bottom:1px solid var(--ci-journal-line); padding:var(--ci-s-7) 0; }
.ar-author__eyebrow { direction:ltr; font-family:var(--ci-sans); font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--ci-lime); margin:0 0 var(--ci-s-3); }
.ar-author__name { direction:ltr; font-family:var(--ci-serif); font-weight:500; font-style:normal; font-size:var(--ci-h3); color:var(--ci-journal-fg); margin:0 0 var(--ci-s-4); }
.ar-author__name em { font-style:italic; color:var(--ci-lime); }
.ar-author__bio { font-family:var(--ci-sans-he); font-weight:300; font-size:15px; line-height:1.8; color:var(--ci-journal-fg-soft); max-width:52ch; margin:0 auto; }

/* --- Sources (added section) -------------------------------- */
.ar-sources { padding:var(--ci-s-8) 0; }
.ar-sources__eyebrow { direction:ltr; text-align:right; font-family:var(--ci-sans); font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--ci-lime); margin:0 0 var(--ci-s-5); }
.ar-sources__list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; }
.ar-sources__item { direction:ltr; text-align:left; padding:var(--ci-s-4) 0; border-top:1px solid var(--ci-journal-line); display:flex; gap:var(--ci-s-4); align-items:baseline; }
.ar-sources__item:last-child { border-bottom:1px solid var(--ci-journal-line); }
.ar-sources__no { font-family:var(--ci-serif); font-style:italic; font-size:15px; color:var(--ci-lime); flex:none; min-width:28px; }
.ar-sources__link { font-family:var(--ci-sans); font-size:14px; line-height:1.5; color:var(--ci-journal-fg); text-decoration:none; transition:color var(--ci-dur-base) var(--ci-ease); }
.ar-sources__link:hover { color:var(--ci-lime); }
.ar-sources__src { color:var(--ci-journal-fg-faint); }

/* 11 · CTA */
.ar-cta { text-align:center; max-width:820px; margin:0 auto; padding:var(--ci-s-9) 0; }
.ar-cta__eyebrow { direction:ltr; font-family:var(--ci-sans); font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--ci-lime); margin:0 0 var(--ci-s-5); }
.ar-cta__q { font-family:var(--ci-serif-he); font-weight:700; font-size:clamp(32px,4vw,56px); line-height:1.15; color:var(--ci-journal-fg); margin:0 0 var(--ci-s-7); }
.ar-cta__q strong { font-weight:800; color:var(--ci-lime); }
.ar-cta__row { display:flex; gap:var(--ci-s-4); justify-content:center; flex-wrap:wrap; }
.ar-btn-outline { display:inline-flex; align-items:center; justify-content:center; height:52px; padding:0 28px; border-radius:var(--ci-r-pill); background:transparent; color:var(--ci-journal-fg); border:1.5px solid var(--ci-journal-line); font-family:var(--ci-sans); font-size:15px; font-weight:500; text-decoration:none; transition:border-color var(--ci-dur-base) var(--ci-ease), color var(--ci-dur-base) var(--ci-ease); }
.ar-btn-outline:hover { border-color:var(--ci-lime); color:var(--ci-lime); }

/* --- Image placeholders ------------------------------------- */
.ar-ph { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; text-align:center;
  background-color:var(--ci-journal-deep);
  background-image:repeating-linear-gradient(-45deg, rgba(240,238,233,0.04) 0, rgba(240,238,233,0.04) 1px, transparent 1px, transparent 11px), linear-gradient(155deg,#0E2742 0%, #0A1A2E 60%, #050E1C 100%);
  border:1px solid var(--ci-journal-line); border-radius:var(--ci-r-md); overflow:hidden; padding:20px; }
.ar-ph__type { font-family:var(--ci-pixel); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ci-lime); }
