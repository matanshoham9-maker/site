/* ================================================================
   Course It · Article Page (self-contained) — DARK Journal mode.

:root {

  --ci-white:#FFFFFF; --ci-deep-blue:#024BB9; --ci-deep-blue-2:#023A91;

  --ci-serif-he:'Heebo', system-ui, sans-serif;

    <div className="ar-measure ar-sources reveal">
      <p className="ar-sources__eyebrow">Sources</p>
      <ul className="ar-sources__list">
        {a.sources.map((s, i) => {
          const isObj = typeof s === 'object' && s !== null;
          const label = isObj ? s.title : s;
          const rtl = /[\u0590-\u05FF]/.test(label);
          return (
          <li className="ar-sources__item" key={i} dir={rtl ? 'rtl' : 'ltr'}>
            <span className="ar-sources__no">{String(i + 1).padStart(2, '0')}</span>
            {isObj && s.url
              ? <a className="ar-sources__link" href={s.url} target="_blank" rel="noopener noreferrer">{label} <span className="ar-sources__src">— {s.author}, {s.year} ↗</span></a>
              : <span className="ar-sources__link">{label}</span>}
          </li>
          );
        })}
      </ul>
    </div>
  </section>
);

const Cta = ({ a }) => (
  <section className="ar-wrap" data-screen-label="CTA">
    <div className="ar-cta reveal">
      <p className="ar-cta__eyebrow">{a.cta.eyebrow}</p>
      <h2 className="ar-cta__q" dangerouslySetInnerHTML={{ __html: md(a.cta.questionHtml) }} />
      <div className="ar-cta__row">
        <a className="ci-btn ci-btn--lime ci-btn--lg" href={a.cta.primary.href}>{a.cta.primary.label} →</a>
        <a className="ar-btn-outline" href={a.cta.secondary.href} target="_blank" rel="noopener noreferrer">{a.cta.secondary.label} ↗</a>
      </div>
    </div>
  </section>
);

const ArticlePage = ({ a }) => {
  return (
    <div className="ar" dir="rtl">
      <Header />
      <main>
        <IssueBanner a={a} />
        <Opener a={a} />
        <Hero a={a} />
        <Lede a={a} />
        <Chapter ch={a.chapters[0]} />
        <Figure img={a.images[0]} />
        <Chapter ch={a.chapters[1]} />
        <PullQuote q={a.pullQuotes[0]} />
        <Chapter ch={a.chapters[2]} />
        <Figure img={a.images[1]} />
        <Chapter ch={a.chapters[3]} />
        <PullQuote q={a.pullQuotes[1]} />
        <Ornament />
        <Takeaways a={a} />
        <Author a={a} />
        <Sources a={a} />
        <Cta a={a} />
      </main>
      <Footer />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<ArticlePage a={ARTICLE} />);
</script>
</body>
</html>
