/* ================================================================
   Course It · shared/chrome.css
   Shared site chrome — sticky header (lockup + nav) and full footer.
   Used by every public surface (marketing-site, creator pages, …).
   Pairs with colors_and_type.css + components.css. No tokens defined
   here — layout only, all values reference system tokens.
   ================================================================ */

/* --- Sticky header / nav ------------------------------------- */
.ci-siteheader {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px var(--ci-margin-desktop);
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--ci-line);
}
.ci-siteheader__nav { display: flex; gap: 36px; align-items: center; }
.ci-siteheader__nav a {
  color: var(--ci-ink);
  font-size: 14px; font-weight: 400;
  text-decoration: none;
  letter-spacing: 0.01em;
}
.ci-siteheader__nav a:hover { color: var(--ci-deep-blue); }
.ci-siteheader__nav a[aria-current="page"] {
  color: var(--ci-deep-blue);
  font-style: italic;
  font-family: var(--ci-serif);
  font-weight: 600;
  font-size: 16px;
}
/* Hebrew current-link: no italic (Hebrew has no italic) */
[dir="rtl"] .ci-siteheader__nav a[aria-current="page"] {
  font-style: normal;
  font-family: var(--ci-serif-he);
  font-weight: 700;
}

/* Dark / Journal header — navy translucent, Cloud-Dancer lockup, Lime hover */
.ci-siteheader--dark {
  background: rgba(10,26,46,0.6);
  border-bottom: 1px solid var(--ci-journal-line);
}
.ci-siteheader--dark .ci-lockup__name { color: var(--ci-journal-fg); }
.ci-siteheader--dark .ci-siteheader__nav a { color: var(--ci-journal-fg); }
.ci-siteheader--dark .ci-siteheader__nav a:hover { color: var(--ci-lime); }
.ci-siteheader--dark .ci-siteheader__nav a[aria-current="page"] { color: var(--ci-lime); }


/* --- Footer --------------------------------------------------- */
.ci-sitefooter {
  background: var(--ci-white); color: var(--ci-ink);
  padding: 96px var(--ci-margin-desktop) 56px;
  border-top: 1.5px solid var(--ci-line);
}
.ci-sitefooter__inner { max-width: 1280px; margin: 0 auto; }
.ci-sitefooter__top {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 56px;
  padding-bottom: 64px; border-bottom: 1px dotted var(--ci-line-strong);
}
.ci-sitefooter__brand h3 {
  font-family: var(--ci-serif); font-weight: 600; font-size: 44px;
  line-height: 1; margin: 22px 0 18px; letter-spacing: -0.01em;
}
.ci-sitefooter__brand h3 em { font-style: italic; color: var(--ci-deep-blue); }
.ci-sitefooter__brand p { font-size: 14px; color: var(--ci-fg-soft); max-width: 360px; line-height: 1.55; margin: 0; }
.ci-sitefooter__col h5 {
  font-family: var(--ci-sans); font-size: 12px; font-weight: 500;
  color: var(--ci-field); margin: 0 0 18px;
  letter-spacing: 0.16em; text-transform: uppercase;
}
.ci-sitefooter__col a {
  display: block; color: var(--ci-ink); text-decoration: none; font-size: 14px;
  padding: 6px 0;
}
.ci-sitefooter__col a:hover { color: var(--ci-deep-blue); }
.ci-sitefooter__bottom {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 32px; font-size: 12px; color: var(--ci-fg-faint);
}

/* Hebrew footer headline → Heebo, no italic */
[dir="rtl"] .ci-sitefooter__brand h3 { font-family: var(--ci-serif-he); font-weight: 700; }
[dir="rtl"] .ci-sitefooter__brand h3 em { font-style: normal; }

/* Dark / Journal footer — deeper navy, Cloud-Dancer text, Lime accents */
.ci-sitefooter--dark {
  background: var(--ci-journal-deep);
  color: var(--ci-journal-fg);
  border-top: 1px solid var(--ci-journal-line);
}
.ci-sitefooter--dark .ci-sitefooter__brand h3 em { color: var(--ci-lime); }
.ci-sitefooter--dark .ci-sitefooter__brand p { color: var(--ci-journal-fg-soft); }
.ci-sitefooter--dark .ci-sitefooter__top { border-bottom-color: var(--ci-journal-line); }
.ci-sitefooter--dark .ci-sitefooter__col h5 { color: var(--ci-lime); }
.ci-sitefooter--dark .ci-sitefooter__col a { color: var(--ci-journal-fg); }
.ci-sitefooter--dark .ci-sitefooter__col a:hover { color: var(--ci-lime); }
.ci-sitefooter--dark .ci-sitefooter__bottom { color: var(--ci-journal-fg-faint); }


/* --- Responsive ----------------------------------------------- */
@media (max-width: 900px) {
  .ci-siteheader { padding: 16px var(--ci-margin-mobile); }
  .ci-siteheader__nav { gap: 18px; }
  .ci-sitefooter { padding-left: var(--ci-margin-mobile); padding-right: var(--ci-margin-mobile); }
  .ci-sitefooter__top { grid-template-columns: 1fr; gap: 40px; }
}
@media (max-width: 560px) {
  .ci-siteheader__nav { display: none; }
}

/* ================================================================
   Course It · creator-page/creator.css
   Layout for the Creator Page Template ONLY. Zero design tokens are
   defined here — every value references colors_and_type.css tokens.
   Pairs with: colors_and_type.css, components.css, ../shared/chrome.css
   ================================================================ */

.cr-page { background: var(--ci-white); }

/* The frame (eyebrows, section headlines, grid) is LTR English.
   Hebrew creator content opts into RTL via [dir="rtl"] on its block. */

/* Shared section shell ---------------------------------------- */
.cr-sec { padding: var(--ci-section-desktop) 0; position: relative; }
.cr-sec--tight { padding: calc(var(--ci-section-desktop) * 0.66) 0; }
.cr-wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 var(--ci-margin-desktop); }

/* Frame eyebrow (English) — number/label above each section */
.cr-eyebrow {
  font-family: var(--ci-pixel);
  font-size: var(--ci-pixel-label);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--ci-field);
  margin: 0 0 22px;
}
.ci-on-dark .cr-eyebrow { color: var(--ci-lime); }

/* English section headline — Cormorant, italic-blue accent */
.cr-head {
  font-family: var(--ci-serif);
  font-weight: 600;
  font-size: var(--ci-h2);
  line-height: 1.0;
  letter-spacing: -0.01em;
  margin: 0 0 var(--ci-s-7);
  text-wrap: balance;
}
.cr-head em { font-style: italic; color: var(--ci-deep-blue); }
.ci-on-dark .cr-head em { color: var(--ci-lime); }

/* Hebrew prose block (RTL) — Heebo, generous measure */
.cr-prose { max-width: 60ch; }
.cr-prose p {
  font-family: var(--ci-sans-he);
  font-size: var(--ci-lead);
  line-height: 1.75;
  color: var(--ci-fg-soft);
  margin: 0 0 var(--ci-s-5);
}
.cr-prose p:last-child { margin-bottom: 0; }
.ci-on-dark .cr-prose p { color: var(--ci-on-blue-soft); }


/* --- Image placeholder (labeled, captioned — never stock) ---- */
.cr-ph {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  text-align: center;
  background-color: var(--ci-cloud);
  background-image: repeating-linear-gradient(
    -45deg,
    rgba(10,10,10,0.035) 0, rgba(10,10,10,0.035) 1px,
    transparent 1px, transparent 11px);
  border: 1px solid var(--ci-line);
  border-radius: var(--ci-r-lg);
  overflow: hidden;
  color: var(--ci-fg-faint);
  padding: 24px;
}
.cr-ph__type {
  font-family: var(--ci-pixel);
  font-size: var(--ci-pixel-label);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ci-field);
}
.cr-ph__cap {
  font-family: var(--ci-sans);
  font-size: var(--ci-micro);
  line-height: 1.4;
  color: var(--ci-fg-faint);
  max-width: 24ch;
}
/* Navy-gradient placeholder — the social post / Blue Desk imagery lives
   INSIDE the frame; the section around it stays on the page background. */
.cr-ph--dark {
  background-color: var(--ci-deep-blue-2);
  background-image:
    repeating-linear-gradient(-45deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 11px),
    linear-gradient(155deg, #0A1A3A 0%, #023A91 52%, #024BB9 100%);
  border-color: var(--ci-on-blue-line);
}
.cr-ph--dark .cr-ph__type { color: var(--ci-lime); }
.cr-ph--dark .cr-ph__cap { color: var(--ci-on-blue-soft); }

/* Blue-desk placeholder — warmer blue, hints at the signature top-down
   flat-lay on the recurring Blue Desk. */
.cr-ph--bluedesk {
  background-color: #3A66A8;
  background-image:
    repeating-linear-gradient(-45deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 11px),
    linear-gradient(160deg, #4E7FC2 0%, #355F9C 55%, #284B82 100%);
  border-color: rgba(255,255,255,0.18);
}
.cr-ph--bluedesk .cr-ph__type { color: #F0EEE9; }
.cr-ph--bluedesk .cr-ph__cap { color: rgba(255,255,255,0.82); }


/* --- 01 · Hero ----------------------------------------------- */
.cr-hero { padding-top: var(--ci-s-9); }
.cr-hero__grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: var(--ci-s-8); align-items: center;
}
.cr-hero__name {
  font-family: var(--ci-serif);
  font-weight: 600;
  font-size: clamp(56px, 7vw, 104px);
  line-height: 0.92;
  letter-spacing: -0.02em;
  margin: 18px 0 18px;
}
.cr-hero__name em { font-style: italic; color: var(--ci-deep-blue); }
.cr-hero__field {
  font-family: var(--ci-sans);
  font-size: 13px; font-weight: 500;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ci-field);
  margin: 0 0 var(--ci-s-7);
}
.cr-metarows { display: grid; gap: var(--ci-s-3); border-top: 1px solid var(--ci-line); padding-top: var(--ci-s-5); }
.cr-metarow { display: grid; grid-template-columns: 116px 1fr; gap: var(--ci-s-4); align-items: baseline; }
.cr-metarow__k {
  font-family: var(--ci-pixel); font-size: var(--ci-pixel-label);
  letter-spacing: 0.04em; text-transform: uppercase; color: var(--ci-fg-faint);
}
.cr-metarow__v { font-family: var(--ci-sans); font-size: var(--ci-body); color: var(--ci-fg); }
.cr-metarow__v[dir="rtl"] { font-family: var(--ci-sans-he); }
.cr-hero__portrait { aspect-ratio: 4 / 5; }


/* --- 02 · Quote ---------------------------------------------- */
.cr-quote { text-align: center; }
.cr-quote__q {
  font-family: var(--ci-serif-he);
  font-weight: 700;
  font-size: var(--ci-h2);
  line-height: 1.25;
  letter-spacing: -0.015em;
  color: var(--ci-fg);
  max-width: 18ch;
  margin: 0 auto var(--ci-s-6);
  text-wrap: balance;
}
.cr-quote__by {
  font-family: var(--ci-sans);
  font-size: var(--ci-small);
  letter-spacing: 0.04em;
  color: var(--ci-fg-faint);
}


/* --- 03 · Who they are --------------------------------------- */
.cr-who__grid {
  display: grid; grid-template-columns: 0.9fr 1.1fr;
  gap: var(--ci-s-8); align-items: center;
}
.cr-who__img { aspect-ratio: 4 / 5; }


/* --- 04 · The course (editorial light) ---------------------- */
/* No background fill — sits on the page background like every other
   section. The huge black Hebrew course name is the visual hero; the
   single Lime CTA is the only Lime on the page. */
.cr-course__grid {
  display: grid; grid-template-columns: 1.1fr 0.9fr;
  gap: var(--ci-s-8); align-items: center;
}
.cr-course__name {
  font-family: var(--ci-serif-he);
  font-weight: 900;
  font-size: clamp(60px, 8vw, 132px);
  line-height: 0.95;
  letter-spacing: -0.02em;
  color: var(--ci-black);
  margin: 0 0 var(--ci-s-4);
}
.cr-course__sub {
  font-family: var(--ci-serif);
  font-style: italic;
  font-size: var(--ci-h3);
  color: var(--ci-deep-blue);
  margin: 0 0 var(--ci-s-6);
}
.cr-course .cr-prose p { color: rgba(10,10,10,0.7); }
.cr-course__cta { margin-top: var(--ci-s-7); }
.cr-course__social { aspect-ratio: 4 / 5; }


/* --- 05 · Lessons -------------------------------------------- */
.cr-lessons { border-top: 1.5px solid var(--ci-line); }
.cr-lesson {
  display: grid; grid-template-columns: 120px 1fr; gap: var(--ci-s-7);
  align-items: start;
  padding: var(--ci-s-6) 0;
  border-bottom: 1px solid var(--ci-line);
  transition: background var(--ci-dur-base) var(--ci-ease);
}
.cr-lesson__num {
  font-family: var(--ci-serif);
  font-weight: 600;
  font-size: clamp(40px, 4vw, 64px);
  line-height: 0.9;
  color: var(--ci-deep-blue);
}
.cr-lesson__title {
  font-family: var(--ci-serif-he);
  font-weight: 700;
  font-size: var(--ci-h3);
  line-height: 1.1;
  color: var(--ci-fg);
  margin: 0 0 var(--ci-s-3);
}
.cr-lesson__desc {
  font-family: var(--ci-sans-he);
  font-size: var(--ci-body);
  line-height: 1.7;
  color: var(--ci-fg-soft);
  max-width: 64ch;
  margin: 0;
}


/* --- 06 · Behind the build ----------------------------------- */
.cr-bts__top {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: var(--ci-s-8); align-items: start; margin-bottom: var(--ci-s-6);
}
.cr-bts__main { aspect-ratio: 4 / 3; min-height: 320px; align-self: start; }
.cr-bts__secondary { display: grid; grid-template-columns: 1fr 1fr; gap: var(--ci-s-6); }
.cr-bts__secondary .cr-ph { aspect-ratio: 16 / 10; }


/* --- 07 · Works (asymmetric) --------------------------------- */
.cr-works__grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 200px;
  gap: var(--ci-s-5);
}
.cr-work { width: 100%; height: 100%; }
.cr-work--a { grid-column: span 4; grid-row: span 2; }
.cr-work--b { grid-column: span 2; grid-row: span 1; }
.cr-work--c { grid-column: span 2; grid-row: span 1; }
.cr-work--d { grid-column: span 6; grid-row: span 1; }


/* --- 08 · Next creator --------------------------------------- */
.cr-next__grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--ci-s-5); }
.cr-nextcard {
  display: flex; flex-direction: column; gap: var(--ci-s-4);
  padding: var(--ci-s-7);
  border: 1.5px solid var(--ci-line);
  border-radius: var(--ci-r-lg);
  text-decoration: none;
  color: var(--ci-fg);
  background: var(--ci-white);
  transition: border-color var(--ci-dur-base) var(--ci-ease),
              box-shadow var(--ci-dur-base) var(--ci-ease),
              transform var(--ci-dur-base) var(--ci-ease);
}
.cr-nextcard:hover { border-color: var(--ci-line-strong); box-shadow: var(--ci-shadow-2); }
.cr-nextcard--next { text-align: right; align-items: flex-end; }
.cr-nextcard__dir {
  font-family: var(--ci-pixel); font-size: var(--ci-pixel-label);
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--ci-field);
}
.cr-nextcard__name {
  font-family: var(--ci-serif); font-weight: 600;
  font-size: var(--ci-h3); line-height: 1.0; margin: 0;
}
.cr-nextcard__name em { font-style: italic; color: var(--ci-deep-blue); }
.cr-nextcard__field {
  font-family: var(--ci-sans); font-size: var(--ci-small);
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ci-fg-faint);
}


/* --- Responsive ---------------------------------------------- */
@media (max-width: 900px) {
  .cr-sec { padding: var(--ci-section-mobile) 0; }
  .cr-wrap { padding: 0 var(--ci-margin-mobile); }
  .cr-hero__grid,
  .cr-who__grid,
  .cr-course__grid,
  .cr-bts__top,
  .cr-next__grid { grid-template-columns: 1fr; gap: var(--ci-s-6); }
  .cr-hero__portrait, .cr-who__img, .cr-course__social { aspect-ratio: 4 / 3; }
  .cr-lesson { grid-template-columns: 64px 1fr; gap: var(--ci-s-5); }
  .cr-works__grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 160px; }
  .cr-work--a, .cr-work--b, .cr-work--c, .cr-work--d { grid-column: span 2; grid-row: span 1; }
  .cr-nextcard--next { text-align: left; align-items: flex-start; }
}

</style>
</head>

  prevCreator: { slug: '', name: 'Back to', nameItalic: 'creators', field: 'Who we build with' },
  nextCreator: { slug: '', name: 'Every creator', nameItalic: 'has a course', field: 'Course It · Tel Aviv' }
};
</script>
<script type="text/babel" data-presets="react">
// SiteHeader.jsx — shared sticky header (lockup + nav).
// System chrome used by every public surface. Exposes window.SiteHeader.
//
// Props:
//   lang          'en' | 'he'                 — drives default nav labels + RTL
//   onLang(next)  optional                    — language toggle handler (hidden if omitted)
//   onOpenContact optional                    — CTA handler; falls back to an href
//   links         optional [{href,label,current,onClick}] — override the default nav
//   homeHref      optional (default '#top')   — where the lockup links
//   ctaHref       optional (default '#contact')— DM button href when no onOpenContact
//   theme         'light' | 'dark'            — dark = Journal navy chrome
const SiteHeader = ({ lang = 'en', onLang, onOpenContact, links, homeHref = '#top', ctaHref = '#contact', theme = 'light' }) => {
  const isHe = lang === 'he';
  const dark = theme === 'dark';
  const defaultLinks = isHe
    ? [
        { href: '#work', label: 'הקורסים' },
        { href: '#manifesto', label: 'אודות', current: true },
        { href: '#process', label: 'תהליך' },
        { href: '#contact', label: 'צרו קשר', onClick: onOpenContact }
      ]
    : [
        { href: '#work', label: 'Our work' },
        { href: '#manifesto', label: 'About', current: true },
        { href: '#process', label: 'Process' },
        { href: '#contact', label: 'Contact', onClick: onOpenContact }
      ];
  const nav = links || defaultLinks;
  const mark = dark ? 'assets/logo-diamond-white.svg' : 'assets/logo-diamond-black.svg';
  const ctaLabel = isHe ? 'DM אותנו →' : 'DM us →';
  return (
    <header className={`ci-siteheader ${dark ? 'ci-siteheader--dark' : ''}`}>
      <a href={homeHref} className="ci-lockup" style={{ textDecoration: 'none' }}>
        <img src={mark} alt="Course It" className="ci-lockup__mark" />
        <span className="ci-lockup__name">COURSE IT</span>
      </a>
      <nav className="ci-siteheader__nav">
        {nav.map(l => (
          <a key={l.label} href={l.href}
             aria-current={l.current ? 'page' : undefined}
             onClick={l.onClick ? (e) => { e.preventDefault(); l.onClick(); } : undefined}>
            {l.label}
          </a>
        ))}
        {onLang && (
          <button
            onClick={() => onLang(isHe ? 'en' : 'he')}
            className="ci-btn ci-btn--ghost ci-btn--sm"
            style={{ fontFamily: 'var(--ci-pixel)', fontSize: 9, letterSpacing: '0.04em' }}>
            {isHe ? 'EN' : 'עברית'}
          </button>
        )}
        {onOpenContact
          ? <button className={`ci-btn ci-btn--sm ${dark ? 'ci-btn--lime' : ''}`} onClick={onOpenContact}>{ctaLabel}</button>
          : <a className={`ci-btn ci-btn--sm ${dark ? 'ci-btn--lime' : ''}`} href={ctaHref}>{ctaLabel}</a>}
      </nav>
    </header>
  );
};
window.SiteHeader = SiteHeader;

</script>
<script type="text/babel" data-presets="react">
// SiteFooter.jsx — shared site footer (brand + link columns + baseline).
// System chrome used by every public surface. Exposes window.SiteFooter.
//
// Props:
//   lang   'en' | 'he'           — labels + RTL direction
//   theme  'light' | 'dark'       — dark = Journal deep-navy footer
const SiteFooter = ({ lang = 'en', theme = 'light' }) => {
  const isHe = lang === 'he';
  const dark = theme === 'dark';
  const mark = dark ? 'assets/logo-diamond-white.svg' : 'assets/logo-diamond-black.svg';
  return (
    <footer className={`ci-sitefooter ${dark ? 'ci-sitefooter--dark' : ''}`} dir={isHe ? 'rtl' : 'ltr'}>
      <div className="ci-sitefooter__inner">
        <div className="ci-sitefooter__top">
          <div className="ci-sitefooter__brand">
            <img src={mark} alt="Course It" style={{ height: 56, width: 'auto' }} />
            <h3>
              {isHe ? (<>לכל יוצר <em>יש קורס.</em></>) : (<>Every creator <em>has a course.</em></>)}
            </h3>
            <p>{isHe ? 'סטודיו לבניית קורסים · תל אביב · 2026' : 'Course Building Studio · Tel Aviv · 2026'}</p>
          </div>
          <div className="ci-sitefooter__col">
            <h5>{isHe ? 'הסטודיו' : 'STUDIO'}</h5>
            <a href="#">{isHe ? 'אודות' : 'About'}</a>
            <a href="#">{isHe ? 'תהליך' : 'Process'}</a>
            <a href="#">{isHe ? 'הצוות' : 'Team'}</a>
            <a href="#">{isHe ? 'הקורסים' : 'Courses'}</a>
          </div>
          <div className="ci-sitefooter__col">
            <h5>{isHe ? 'יוצרים' : 'FOR CREATORS'}</h5>
            <a href="#">{isHe ? 'איך זה עובד' : 'How it works'}</a>
            <a href="#">{isHe ? 'מחיר' : 'Pricing'}</a>
            <a href="#">{isHe ? 'שאלות נפוצות' : 'FAQ'}</a>
            <a href="#">{isHe ? 'DM' : 'DM us'}</a>
          </div>
          <div className="ci-sitefooter__col">
            <h5>{isHe ? 'עקבו' : 'FOLLOW'}</h5>
            <a href="#">Instagram ↗</a>
            <a href="#">YouTube ↗</a>
            <a href="#">LinkedIn ↗</a>
          </div>
        </div>
        <div className="ci-sitefooter__bottom">
          <span>© 2026 Course It Studio · {isHe ? 'נבנה ב-תל אביב' : 'Made in Tel Aviv'} <span style={{ color: '#CC1122' }}>♥</span></span>
          <span style={{ fontFamily: 'var(--ci-sans)', fontSize: 11, fontWeight: 500, letterSpacing: '0.22em', textTransform: 'uppercase' }}>COURSE IT · 2026</span>
        </div>
      </div>
    </footer>
  );
};
window.SiteFooter = SiteFooter;

</script>
<script type="text/babel" data-presets="react">
// CreatorPage.jsx — the Creator Page Template.
// One data-driven component renders an entire creator profile from a
// single `creator` object (see creatorData.js for the schema). Every
// creator page shares this structure; only the data + images change.
//
// Frame (eyebrows, section headlines, meta keys) = English — the Course
// It signature. Creator content (story, quote, lessons) = Hebrew, RTL.
//
// Props:
//   creator   the creator data object (required)
//   linkBase  href prefix for prev/next pages (default '../' → sibling folder)
//
// Depends on window.SiteHeader / window.SiteFooter (shared chrome) and the
// system stylesheets. Exposes window.CreatorPage.



/* Labeled, captioned image placeholder — never stock (brand rule). */
const Placeholder = ({ type, caption, dark, className = '' }) => (
  <div className={`cr-ph ${dark ? 'cr-ph--dark' : ''} ${className}`} role="img" aria-label={type}>
    <span className="cr-ph__type">{type}</span>
    {caption && <span className="cr-ph__cap">{caption}</span>}
  </div>
);

/* 01 · HERO — split 50/50: meta + portrait */
const HeroSection = ({ creator: c }) => (
  <section className="cr-sec cr-hero" data-screen-label="01 Hero">
    <div className="cr-wrap">
      <div className="cr-hero__grid">
        <div className="cr-hero__meta">
          <p className="cr-eyebrow">CREATOR · {c.creatorNumber}</p>
          <h1 className="cr-hero__name">{c.name} <em>{c.nameItalic}</em></h1>
          <p className="cr-hero__field">{c.field}</p>
          <div className="cr-metarows">
            <div className="cr-metarow"><span className="cr-metarow__k">Based in</span><span className="cr-metarow__v">{c.basedIn}</span></div>
            <div className="cr-metarow"><span className="cr-metarow__k">Course</span><span className="cr-metarow__v" dir="rtl">{c.courseTitle}</span></div>
            <div className="cr-metarow"><span className="cr-metarow__k">Filmed</span><span className="cr-metarow__v">{c.filmedDate}</span></div>
          </div>
        </div>
        <Placeholder className="cr-hero__portrait" type="Portrait" caption={`${c.name} on location · natural light, mid-gesture`} />
      </div>
    </div>
  </section>
);

/* 02 · QUOTE — large centered editorial quote (Hebrew) */
const QuoteSection = ({ creator: c }) => (
  <section className="cr-sec cr-sec--tight" data-screen-label="02 Quote">
    <div className="cr-wrap cr-quote">
      <p className="cr-eyebrow" style={{ textAlign: 'center' }}>In their words</p>
      <blockquote className="cr-quote__q" dir="rtl">{c.heroQuote}</blockquote>
      <span className="cr-quote__by">— {c.quoteAttribution}</span>
    </div>
  </section>
);

/* 03 · WHO THEY ARE — 2-column: image + story text */
const WhoSection = ({ creator: c }) => (
  <section className="cr-sec" data-screen-label="03 Who they are">
    <div className="cr-wrap">
      <div className="cr-who__grid">
        <Placeholder className="cr-who__img cr-ph--bluedesk" type="Ambient" caption="Flat-lay on the blue desk — her objects, her tools" />
        <div className="cr-who__text">
          <p className="cr-eyebrow">Who they are</p>
          <h2 className="cr-head">The person <em>behind it.</em></h2>
          <div className="cr-prose" dir="rtl">
            {c.whoTheyAre.map((p, i) => <p key={i}>{p}</p>)}
          </div>
        </div>
      </div>
    </div>
  </section>
);

/* 04 · THE COURSE — dark section + details + external CTA */
const CourseSection = ({ creator: c }) => (
  <section className="cr-sec cr-course" data-screen-label="04 The course">
    <div className="cr-wrap">
      <div className="cr-course__grid">
        <div className="cr-course__panel">
          <p className="cr-eyebrow">The course</p>
          <h2 className="cr-course__name" dir="rtl">{c.course.nameHebrew}</h2>
          <p className="cr-course__sub">{c.course.subtitleEnglish}</p>
          <div className="cr-prose" dir="rtl">
            <p>{c.course.description}</p>
          </div>
          <div className="cr-course__cta">
            <a className="ci-btn ci-btn--lime ci-btn--lg" href={c.course.externalUrl} target="_blank" rel="noopener noreferrer">
              See the course in action →
            </a>
          </div>
        </div>
        <Placeholder className="cr-course__social" dark type="Social post" caption="Square crop · the course teaser for Instagram" />
      </div>
    </div>
  </section>
);

/* 05 · LESSONS — 5-row editorial list */
const LessonsSection = ({ creator: c }) => (
  <section className="cr-sec" data-screen-label="05 Lessons">
    <div className="cr-wrap">
      <p className="cr-eyebrow">The lessons · 5 parts</p>
      <h2 className="cr-head">Five <em>moves.</em></h2>
      <div className="cr-lessons">
        {c.lessons.map((l) => (
          <article className="cr-lesson" key={l.number}>
            <div className="cr-lesson__num">{l.number}</div>
            <div className="cr-lesson__body" dir="rtl">
              <h3 className="cr-lesson__title">{l.title}</h3>
              <p className="cr-lesson__desc">{l.description}</p>
            </div>
          </article>
        ))}
      </div>
    </div>
  </section>
);

/* 06 · BEHIND THE BUILD — process story + BTS images */
const BehindSection = ({ creator: c }) => (
  <section className="cr-sec" data-screen-label="06 Behind the build">
    <div className="cr-wrap">
      <div className="cr-bts__top">
        <div className="cr-bts__story">
          <p className="cr-eyebrow">Behind the build</p>
          <h2 className="cr-head" dangerouslySetInnerHTML={{ __html: c.behindTheBuild.headline }} />
          <div className="cr-prose" dir="rtl">
            {c.behindTheBuild.paragraphs.map((p, i) => <p key={i}>{p}</p>)}
          </div>
        </div>
        <Placeholder className="cr-bts__main" type="BTS — main" caption="On set · the studio shoot, day one" />
      </div>
      <div className="cr-bts__secondary">
        <Placeholder type="BTS — secondary" caption="Bare walls · the active build site" />
        <Placeholder type="BTS — secondary" caption="Detail · hands, material, light" />
      </div>
    </div>
  </section>
);

/* 07 · WORKS — asymmetric portfolio grid, 4 placeholders */
const WorksSection = ({ creator: c }) => {
  const spans = ['cr-work--a', 'cr-work--b', 'cr-work--c', 'cr-work--d'];
  return (
    <section className="cr-sec" data-screen-label="07 Works">
      <div className="cr-wrap">
        <p className="cr-eyebrow">Selected work</p>
        <h2 className="cr-head">Things they've <em>made.</em></h2>
        <div className="cr-works__grid">
          {c.works.map((w, i) => (
            <Placeholder key={i} className={`cr-work ${spans[i] || ''}`} type="Project" caption={w.caption} />
          ))}
        </div>
      </div>
    </section>
  );
};

/* 08 · NEXT CREATOR — 2-card navigation (real prev/next links) */
const NextSection = ({ creator: c, linkBase }) => {
  const prev = c.prevCreator, next = c.nextCreator;
  return (
    <section className="cr-sec" data-screen-label="08 Next creator">
      <div className="cr-wrap">
        <p className="cr-eyebrow">Keep exploring</p>
        <h2 className="cr-head">More <em>creators.</em></h2>
        <div className="cr-next__grid">
          <a className="cr-nextcard cr-nextcard--prev" href={`${linkBase}${prev.slug}/`}>
            <span className="cr-nextcard__dir">← Previous</span>
            <h3 className="cr-nextcard__name">{prev.name} <em>{prev.nameItalic}</em></h3>
            <span className="cr-nextcard__field">{prev.field}</span>
          </a>
          <a className="cr-nextcard cr-nextcard--next" href={`${linkBase}${next.slug}/`}>
            <span className="cr-nextcard__dir">Next →</span>
            <h3 className="cr-nextcard__name">{next.name} <em>{next.nameItalic}</em></h3>
            <span className="cr-nextcard__field">{next.field}</span>
          </a>
        </div>
      </div>
    </section>
  );
};

const CreatorPage = ({ creator, linkBase = '../' }) => {
  if (!creator) return null;
  // Header is identical to the marketing site's: light chrome, standard nav +
  // DM CTA. Links point back to the marketing site so they resolve from here.
  const ms = 'index.html';
  const nav = [
    { href: ms + '#work', label: 'Our work' },
    { href: ms + '#manifesto', label: 'About' },
    { href: ms + '#process', label: 'Process' },
    { href: ms + '#contact', label: 'Contact' }
  ];
  return (
    <div className="cr-page" dir="ltr">
      <SiteHeader lang="en" links={nav} homeHref={ms} ctaHref={creator.course.externalUrl} />
      <main>
        <HeroSection creator={creator} />
        <QuoteSection creator={creator} />
        <WhoSection creator={creator} />
        <CourseSection creator={creator} />
        <LessonsSection creator={creator} />
        <BehindSection creator={creator} />
        <WorksSection creator={creator} />
        <NextSection creator={creator} linkBase={linkBase} />
      </main>
      <SiteFooter lang="en" />
    </div>
  );
};

window.CreatorPage = CreatorPage;

</script>
<script type="text/babel" data-presets="react">
const creator = window.CREATOR; ReactDOM.createRoot(document.getElementById('root')).render(<CreatorPage creator={creator} linkBase="" />);
</script>
</body>
</html>
